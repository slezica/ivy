appId: com.salezica.ivy
---
# Create a clip from the player and verify it exists.
# This exercises the exec'd FFmpeg slicer end-to-end — the exact path that
# breaks when native packaging regresses (see docs/CLIPS.md "Vendored shared
# libs"), which JS tests can never see. The "Clip added" toast only appears
# after the slice succeeds.

- runFlow: subflows/import-book.yaml

- tapOn: "Ivy Test Book"
- assertVisible:
    id: "add-clip-button"

# Add a clip — toast confirms the FFmpeg slice succeeded
- tapOn:
    id: "add-clip-button"
- extendedWaitUntil:
    visible: "Clip added"
    timeout: 10000
- takeScreenshot: screenshots/clip-01-toast

# The clip must appear in the Clips tab, attributed to the book
- tapOn: "Clips"
- extendedWaitUntil:
    visible: "Ivy Test Book"
    timeout: 5000
- takeScreenshot: screenshots/clip-02-clip-listed
