appId: com.salezica.ivy
---
# Clip lifecycle: create → edit note → verify persistence → delete.
# Note: the clip card does NOT render the note (only title/time/transcription),
# so note persistence is verified by reopening the editor, not reading the card.

- runFlow: subflows/import-book.yaml

# Create a clip
- tapOn: "Ivy Test Book"
- tapOn:
    id: "add-clip-button"
- extendedWaitUntil:
    visible: "Clip added"
    timeout: 10000

# It appears in the Clips tab
- tapOn: "Clips"
- assertVisible:
    id: "clip-card"
- takeScreenshot: screenshots/crud-01-created

# Edit the note via the clip menu → Edit (opens the ClipEditor)
- tapOn:
    id: "clip-menu-button"
- tapOn: "Edit"
- assertVisible: "Add note (optional)"   # editor's note field placeholder
- tapOn: "Add note (optional)"
- inputText: "A test note"
# With the keyboard up, the first tap is consumed dismissing it rather than
# clicking Save; tap again if the editor is still showing.
- tapOn: "Save"
- runFlow:
    when:
      visible: "Save"
    commands:
      - tapOn: "Save"

# Reopen the editor to confirm the note persisted (card doesn't show it)
- tapOn:
    id: "clip-menu-button"
- tapOn: "Edit"
- assertVisible: "A test note"
- takeScreenshot: screenshots/crud-02-note-persisted
# Editor Cancel drops to the ClipViewer (not the list); Close returns to the list
- tapOn: "Cancel"
- tapOn: "Close"

# Delete the clip
- tapOn:
    id: "clip-menu-button"
- tapOn: "Delete"
- assertVisible: "Are you sure you want to delete this clip?"
- tapOn: "Delete"

# Back to empty state
- assertVisible: "No clips yet"
- takeScreenshot: screenshots/crud-03-deleted
