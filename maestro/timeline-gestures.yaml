appId: com.salezica.ivy
---
# Timeline gesture smoke: real touch input on the Skia canvas doesn't crash and
# the player stays responsive afterward.
#
# The gesture *physics* (scroll/momentum/selection/zoom math) is unit-tested in
# src/components/timeline/__tests__/engine.test.ts — far more precisely than a
# Skia canvas can be asserted here (no readable position, only pixels). So this
# flow deliberately does NOT screenshot-and-hope; it drives a couple of real
# gestures and then asserts a verifiable end state: playback still works.

- runFlow: subflows/import-book.yaml
- tapOn: "Ivy Test Book"

# Pause first (import auto-plays) so the timeline is interactive
- tapOn:
    id: "play-pause-button"

# Drive real gestures over the timeline (~42% down the screen): tap-seek + scrub
- tapOn:
    point: "80%,42%"
- swipe:
    start: "30%,42%"
    end: "70%,42%"
    duration: 400
- waitForAnimationToEnd

# Verifiable end state: the app survived the gestures and playback still toggles
- tapOn:
    id: "play-pause-button"
- waitForAnimationToEnd
- assertVisible:
    id: "play-pause-button"
- takeScreenshot: screenshots/timeline-responsive
