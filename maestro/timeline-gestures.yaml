appId: com.salezica.ivy
---
# Timeline gestures: tap-to-seek, drag-to-scrub, momentum flick.
# The timeline is a Skia canvas, so exact positions can't be asserted —
# verification is visual (screenshots) plus proving the app stays responsive
# (playback still works after the gesture sequence).

- runFlow: subflows/import-book.yaml
- tapOn: "Ivy Test Book"

# Pause so the timeline stays still (import auto-plays)
- tapOn:
    id: "play-pause-button"
- takeScreenshot: screenshots/timeline-01-initial

# Tap right side of the timeline to seek forward (~42% down the screen)
- tapOn:
    point: "80%,42%"
- waitForAnimationToEnd
- takeScreenshot: screenshots/timeline-02-after-tap-seek

# Drag to scrub
- swipe:
    start: "30%,42%"
    end: "70%,42%"
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: screenshots/timeline-03-after-swipe

# Quick flick for momentum
- swipe:
    start: "60%,42%"
    end: "20%,42%"
    duration: 150
- waitForAnimationToEnd
- takeScreenshot: screenshots/timeline-04-after-flick

# App stays responsive: playback still works after all the gestures
- tapOn:
    id: "play-pause-button"
- waitForAnimationToEnd
- takeScreenshot: screenshots/timeline-05-playing
