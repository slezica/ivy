appId: com.salezica.ivy
---
# Import a book (via the real document picker) and verify playback controls.
# Exercises the SAF import path, metadata/chapter extraction, and TrackPlayer.

- runFlow: subflows/import-book.yaml
- takeScreenshot: screenshots/load-01-library-with-file

# Open the book in the player
- tapOn: "Ivy Test Book"

# Verify play/pause round trip
- assertVisible:
    id: "play-pause-button"
- tapOn:
    id: "play-pause-button"
- waitForAnimationToEnd
- takeScreenshot: screenshots/load-02-playing
- tapOn:
    id: "play-pause-button"
- takeScreenshot: screenshots/load-03-paused

# Back to the library list
- tapOn: "Library"
- assertVisible: "Ivy Test Book"
- takeScreenshot: screenshots/load-04-library
